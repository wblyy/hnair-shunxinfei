<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海航贵宾室权益对比：白金卡 vs 金卡 vs 顺心飞</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a12;color:#e0e0e0;font-family:'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif;line-height:1.7}
.container{max-width:1200px;margin:0 auto;padding:20px}
header{text-align:center;padding:50px 20px 30px;background:linear-gradient(135deg,#0a0a12 0%,#1a1a2e 50%,#0a0a12 100%);border-bottom:1px solid #222}
header h1{font-size:2.2em;background:linear-gradient(90deg,#ffd700,#ff8c00,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
header p{color:#888;font-size:0.95em}
.section{margin:40px 0}
.section h2{font-size:1.5em;color:#ffd700;border-left:4px solid #ffd700;padding-left:14px;margin-bottom:24px}

/* --- Lounge Table --- */
.lounge-table{width:100%;border-collapse:collapse;font-size:0.88em;overflow-x:auto;display:block}
.lounge-table th{background:#16162a;color:#ffd700;padding:10px 12px;text-align:center;position:sticky;top:0;border-bottom:2px solid #333}
.lounge-table td{padding:9px 12px;border-bottom:1px solid #1e1e30;text-align:center}
.lounge-table tr:hover td{background:#16162a}
.lounge-table .city-cell{text-align:left;font-weight:600;color:#ccc;white-space:nowrap}
.tag-yes{display:inline-block;background:#0d4429;color:#34d399;padding:2px 10px;border-radius:10px;font-size:0.85em}
.tag-no{display:inline-block;background:#441c1c;color:#f87171;padding:2px 10px;border-radius:10px;font-size:0.85em}
.tag-warn{display:inline-block;background:#443b0d;color:#fbbf24;padding:2px 10px;border-radius:10px;font-size:0.85em}
.tag-note{color:#888;font-size:0.8em;display:block;margin-top:2px}
.guest-count{color:#a78bfa;font-weight:600}

/* --- Bubble Map --- */
#bubble-map{width:100%;overflow-x:auto}
#bubble-map svg{display:block;margin:0 auto}
.bubble-label{font-size:11px;fill:#fff;pointer-events:none;text-anchor:middle;font-weight:600}
.bubble-sublabel{font-size:9px;fill:#aaa;pointer-events:none;text-anchor:middle}
.legend-item{cursor:pointer}
.legend-text{font-size:12px;fill:#ccc}
.map-note{text-align:center;color:#666;font-size:0.8em;margin-top:10px}

/* --- Key Findings --- */
.findings{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
.finding-card{background:#13131f;border:1px solid #222;border-radius:12px;padding:20px;transition:all .25s;position:relative;overflow:hidden}
.finding-card:hover{border-color:#ffd700;transform:translateY(-3px);box-shadow:0 8px 25px rgba(255,215,0,.08)}
.finding-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;border-radius:12px 0 0 12px}
.finding-card.f-yes::before{background:#34d399}
.finding-card.f-warn::before{background:#fbbf24}
.finding-card.f-no::before{background:#f87171}
.finding-card h3{font-size:1em;margin-bottom:8px}
.finding-card p{color:#999;font-size:0.9em}
.finding-icon{font-size:1.3em;margin-right:6px}

/* --- Guest Rules --- */
.guest-rules{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
.guest-card{background:#13131f;border:1px solid #222;border-radius:14px;padding:28px 36px;text-align:center;min-width:200px;flex:1;max-width:300px;transition:all .25s}
.guest-card:hover{transform:translateY(-4px);box-shadow:0 8px 25px rgba(0,0,0,.4)}
.guest-card .level{font-size:1.1em;font-weight:700;margin-bottom:6px}
.guest-card .count{font-size:2.8em;font-weight:800;margin:10px 0}
.guest-card .desc{color:#888;font-size:0.85em}
.gc-platinum .level{color:#e5c07b}
.gc-platinum .count{color:#ffd700}
.gc-platinum{border-color:#3d3520}
.gc-gold .level{color:#9ca3af}
.gc-gold .count{color:#c0c0c0}
.gc-gold{border-color:#2a2a3a}
.gc-shunxin .level{color:#60a5fa}
.gc-shunxin .count{color:#3b82f6}
.gc-shunxin{border-color:#1e2940}

/* --- Shunxin 9 Cities --- */
.city-pills{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.city-pill{background:#16162a;border:1px solid #3b82f6;border-radius:20px;padding:8px 20px;color:#60a5fa;font-size:0.95em;transition:all .2s}
.city-pill:hover{background:#1e2940;transform:scale(1.05)}

/* --- Footer --- */
footer{text-align:center;padding:40px 20px;border-top:1px solid #1a1a2a;color:#555;font-size:0.82em;margin-top:50px}
footer a{color:#60a5fa;text-decoration:none}

/* --- Tooltip --- */
.tooltip{position:absolute;background:#1a1a2e;border:1px solid #444;border-radius:8px;padding:12px 16px;font-size:0.85em;pointer-events:none;opacity:0;transition:opacity .15s;z-index:100;max-width:280px;box-shadow:0 4px 20px rgba(0,0,0,.6)}
.tooltip .tt-city{color:#ffd700;font-weight:700;font-size:1em;margin-bottom:4px}
.tooltip .tt-row{margin:3px 0;color:#ccc}

/* --- Filter Buttons --- */
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:24px}
.filter-btn{background:#16162a;border:1px solid #333;color:#aaa;padding:6px 18px;border-radius:20px;cursor:pointer;font-size:0.85em;transition:all .2s}
.filter-btn:hover,.filter-btn.active{color:#ffd700;border-color:#ffd700}
.filter-btn.active{background:#222}

@media(max-width:768px){
  header h1{font-size:1.5em}
  .section h2{font-size:1.2em}
  .guest-card{min-width:140px;padding:20px}
  .lounge-table{font-size:0.78em}
}
</style>
</head>
<body>

<header>
  <h1>海航贵宾室权益对比：白金卡 vs 金卡 vs 顺心飞</h1>
  <p>基于海南航空官网 (hnair.com) 数据整理 · 仅供出行参考</p>
</header>

<div class="container">

  <!-- Section 1: Lounge Table -->
  <div class="section">
    <h2>🏢 全国自营贵宾室对比一览</h2>
    <div style="overflow-x:auto">
      <table class="lounge-table" id="lounge-table">
        <thead>
          <tr>
            <th>贵宾室</th>
            <th>白金卡</th>
            <th>金卡</th>
            <th>顺心飞</th>
            <th>可带人数</th>
            <th>备注</th>
          </tr>
        </thead>
        <tbody id="lounge-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- Section 2: Bubble Map -->
  <div class="section">
    <h2>🗺️ 覆盖城市气泡图</h2>
    <div class="filter-bar" id="filter-bar"></div>
    <div id="bubble-map"></div>
    <p class="map-note">气泡大小代表贵宾室数量 · 颜色代表各卡种覆盖状态 · 点击图例筛选</p>
  </div>

  <!-- Section 3: Key Findings -->
  <div class="section">
    <h2>🔍 关键发现</h2>
    <div class="findings" id="findings"></div>
  </div>

  <!-- Section 4: Guest Rules -->
  <div class="section">
    <h2>👥 带人规则对比</h2>
    <div class="guest-rules" id="guest-rules"></div>
  </div>

  <!-- Section 5: Shunxin 9 Cities -->
  <div class="section">
    <h2>✈️ 顺心飞覆盖的 9 座城市</h2>
    <div class="city-pills" id="city-pills"></div>
  </div>

</div>

<footer>
  <p>数据来源：海南航空官网 <a href="https://www.hnair.com" target="_blank">hnair.com</a> · 核实日期 2026-05-01</p>
  <p style="margin-top:6px">本页面为第三方整理，不代表海航官方立场，具体权益以官网最新公示为准</p>
</footer>

<div class="tooltip" id="tooltip"></div>

<script>
// ========== DATA ==========
const lounges = [
  {city:"北京",airport:"首都 T2",name:"海翼堂（国际出发区）",region:"华北",plat:true,platGuest:2,gold:true,goldGuest:2,shunxin:true,shunxinGuest:0,note:"T2国际登机口212对面",goldNote:"",shunxinNote:""},
  {city:"北京",airport:"首都 T2",name:"海翼轩（国内出港）",region:"华北",plat:true,platGuest:2,gold:false,goldGuest:0,shunxin:false,shunxinGuest:0,note:"T字路口33号登机口附近",goldNote:"金卡去金鹏阁",shunxinNote:""},
  {city:"北京",airport:"首都 T2",name:"金鹏阁（国内出港）",region:"华北",plat:false,platGuest:0,gold:true,goldGuest:1,shunxin:true,shunxinGuest:0,note:"",goldNote:"白金卡去海翼轩",shunxinNote:""},
  {city:"海口",airport:"美兰 T2",name:"海翼轩",region:"华南",plat:true,platGuest:2,gold:false,goldGuest:0,shunxin:true,shunxinGuest:0,note:"T2西侧4楼",goldNote:"金卡去金鹏阁",shunxinNote:""},
  {city:"海口",airport:"美兰 T2",name:"金鹏阁",region:"华南",plat:false,platGuest:0,gold:true,goldGuest:1,shunxin:true,shunxinGuest:0,note:"",goldNote:"",shunxinNote:""},
  {city:"上海",airport:"浦东 T2",name:"海翼轩",region:"华东",plat:true,platGuest:2,gold:true,goldGuest:1,shunxin:true,shunxinGuest:0,note:"C89登机口上方 · 洲际酒店联名",goldNote:"",shunxinNote:""},
  {city:"杭州",airport:"萧山 T3",name:"海翼轩",region:"华东",plat:true,platGuest:2,gold:true,goldGuest:1,shunxin:true,shunxinGuest:0,note:"T3安检后扶梯上楼",goldNote:"",shunxinNote:""},
  {city:"太原",airport:"武宿 T1",name:"自营贵宾室",region:"华北",plat:true,platGuest:2,gold:true,goldGuest:1,shunxin:true,shunxinGuest:0,note:"T1航站楼101登机口右侧",goldNote:"",shunxinNote:""},
  {city:"乌鲁木齐",airport:"地窝堡",name:"自营贵宾室",region:"西北",plat:true,platGuest:2,gold:true,goldGuest:1,shunxin:true,shunxinGuest:0,note:"",goldNote:"",shunxinNote:""},
  {city:"深圳",airport:"宝安",name:"自营贵宾室",region:"华南",plat:true,platGuest:2,gold:true,goldGuest:1,shunxin:false,shunxinGuest:0,note:"",goldNote:"",shunxinNote:"⚠️ 9家名单不含深圳"},
  {city:"广州",airport:"白云",name:"自营贵宾室",region:"华南",plat:true,platGuest:2,gold:true,goldGuest:1,shunxin:false,shunxinGuest:0,note:"",goldNote:"",shunxinNote:"⚠️ 9家名单不含广州"},
  {city:"西安",airport:"咸阳",name:"自营贵宾室",region:"西北",plat:true,platGuest:2,gold:true,goldGuest:1,shunxin:true,shunxinGuest:0,note:"",goldNote:"",shunxinNote:""},
  {city:"天津",airport:"滨海",name:"自营贵宾室",region:"华北",plat:true,platGuest:2,gold:true,goldGuest:1,shunxin:true,shunxinGuest:0,note:"",goldNote:"",shunxinNote:""},
  {city:"昆明",airport:"长水",name:"自营贵宾室",region:"西南",plat:true,platGuest:2,gold:true,goldGuest:1,shunxin:true,shunxinGuest:0,note:"",goldNote:"",shunxinNote:""},
];

const findings = [
  {type:"yes",title:"白金卡经济舱可进海翼堂",text:"官网原文："公务舱旅客、金鹏贵宾会员可享受海翼堂服务"——白金卡属于金鹏贵宾会员，并列关系，经济舱白金卡可用。"},
  {type:"warn",title:"海翼堂位于国际出发区",text:"国际出发区物理隔离，国内航班白金卡旅客无法前往海翼堂，应前往海翼轩或金鹏阁。"},
  {type:"warn",title:"深圳/广州不覆盖顺心飞",text:"官网明确深圳、广州有自营贵宾室，金卡可用，但顺心飞9家名单不含这两座城市。"},
  {type:"no",title:"三亚/哈尔滨/长沙无官网数据",text:"此前流传的表格将这些城市列为"白金卡有、顺心飞没有"，核实官网无此数据，属信息错误。"},
];

const guestRules = [
  {level:"白金卡",cls:"gc-platinum",count:2,desc:"可携带2名同日期同航班旅客"},
  {level:"金卡",cls:"gc-gold",count:1,desc:"可携带1名同日期同航班旅客"},
  {level:"顺心飞",cls:"gc-shunxin",count:0,desc:"仅限本人使用，不可带人"},
];

const shunxin9 = ["北京首都","太原","杭州","上海浦东","乌鲁木齐","海口","西安","天津","昆明"];

const regionCoords = {"华北":{x:580,y:180},"华东":{x:680,y:320},"华南":{x:580,y:420},"西北":{x:380,y:220},"西南":{x:420,y:380}};

// ========== 1. LOUNGE TABLE ==========
const tbody = d3.select("#lounge-tbody");
const filterState = {plat:true,gold:true,shunxin:true};

function renderTable(){
  tbody.selectAll("tr").remove();
  lounges.forEach(L => {
    const tr = tbody.append("tr");

    // City & lounge name
    const cityTd = tr.append("td").attr("class","city-cell");
    cityTd.html(`<span style="color:#ffd700">${L.city}</span> <span style="color:#666">${L.airport}</span><br><span style="color:#aaa;font-weight:400">${L.name}</span>`);

    // Platinum
    const pTd = tr.append("td");
    if(L.plat){
      pTd.html(`<span class="tag-yes">✅</span><br><span class="guest-count">带${L.platGuest}人</span>`);
    } else {
      pTd.html(`<span class="tag-no">❌</span><span class="tag-note">${L.goldNote||'去金鹏阁'}</span>`);
    }

    // Gold
    const gTd = tr.append("td");
    if(L.gold){
      gTd.html(`<span class="tag-yes">✅</span><br><span class="guest-count">带${L.goldGuest}人</span>`);
    } else {
      gTd.html(`<span class="tag-no">❌</span><span class="tag-note">${L.goldNote||'去金鹏阁'}</span>`);
    }

    // Shunxin
    const sTd = tr.append("td");
    if(L.shunxin){
      sTd.html(`<span class="tag-yes">✅</span><br><span class="guest-count">仅本人</span>`);
    } else {
      sTd.html(`<span class="tag-no">❌</span><span class="tag-note">${L.shunxinNote}</span>`);
    }

    // Guests
    tr.append("td").html(`<span class="guest-count">${L.platGuest}/${L.goldGuest}/${L.shunxinGuest}</span>`);

    // Note
    tr.append("td").style("text-align","left").style("font-size","0.82em").style("color","#777").text(L.note);
  });
}
renderTable();

// ========== 2. BUBBLE MAP (D3) ==========
const mapW = 850, mapH = 500;
const svg = d3.select("#bubble-map").append("svg")
  .attr("viewBox",`0 0 ${mapW} ${mapH}`)
  .attr("width","100%")
  .style("max-width",mapW+"px");

// Background grid
for(let gx=0;gx<mapW;gx+=50){
  svg.append("line").attr("x1",gx).attr("y1",0).attr("x2",gx).attr("y2",mapH).attr("stroke","#151520").attr("stroke-width",0.5);
}
for(let gy=0;gy<mapH;gy+=50){
  svg.append("line").attr("x1",0).attr("y1",gy).attr("x2",mapW).attr("y2",gy).attr("stroke","#151520").attr("stroke-width",0.5);
}

// Group lounges by city
const cityGroups = d3.groups(lounges, d=>d.city);
const cityData = cityGroups.map(([city, ls]) => {
  const allPlat = ls.every(l=>l.plat);
  const allGold = ls.every(l=>l.gold);
  const allShunxin = ls.every(l=>l.shunxin);
  const somePlat = ls.some(l=>l.plat);
  const someGold = ls.some(l=>l.gold);
  const someShunxin = ls.some(l=>l.shunxin);
  // Position by region with jitter
  const region = ls[0].region;
  const base = regionCoords[region] || {x:500,y:300};
  const idx = cityGroups.findIndex(c=>c[0]===city);
  const angle = (idx / cityGroups.length) * Math.PI * 2;
  return {
    city, count:ls.length, region, lounges:ls,
    plat:somePlat, gold:someGold, shunxin:someShunxin,
    platFull:allPlat, goldFull:allGold, shunxinFull:allShunxin,
    x: base.x + Math.cos(angle)*45 + (Math.random()-.5)*20,
    y: base.y + Math.sin(angle)*35 + (Math.random()-.5)*20,
    r: 16 + ls.length * 6
  };
});

// Region labels
Object.entries(regionCoords).forEach(([name,coord])=>{
  svg.append("text").attr("x",coord.x).attr("y",coord.y-70)
    .text(name).attr("fill","#2a2a40").attr("font-size","13").attr("text-anchor","middle");
});

// Color logic
function getCityColor(d, tier){
  if(tier==="plat") return d.plat ? "#ffd700" : "#333";
  if(tier==="gold") return d.gold ? "#c0c0c0" : "#333";
  if(tier==="shunxin") return d.shunxin ? "#3b82f6" : "#333";
  // combined
  if(d.plat && d.gold && d.shunxin) return "#ffd700";
  if(d.plat && d.shunxin) return "#60a5fa";
  if(d.plat && d.gold) return "#e5c07b";
  if(d.plat) return "#e5c07b";
  return "#444";
}

let activeFilter = "combined";
const tierColors = {combined:"#ffd700",plat:"#ffd700",gold:"#c0c0c0",shunxin:"#3b82f6"};

// Filter buttons
const filterBar = d3.select("#filter-bar");
["combined","plat","gold","shunxin"].forEach(t=>{
  const labels = {combined:"综合",plat:"白金卡",gold:"金卡",shunxin:"顺心飞"};
  filterBar.append("button")
    .attr("class",()=>`filter-btn${t==="combined"?" active":""}`)
    .text(labels[t])
    .on("click",function(){
      activeFilter = t;
      d3.selectAll(".filter-btn").classed("active",false);
      d3.select(this).classed("active",true);
      updateBubbles();
    });
});

// Draw bubbles
const bubbles = svg.selectAll(".bubble-g")
  .data(cityData)
  .enter().append("g").attr("class","bubble-g")
  .attr("transform",d=>`translate(${d.x},${d.y})`);

bubbles.append("circle")
  .attr("r",d=>d.r)
  .attr("fill",d=>getCityColor(d,"combined"))
  .attr("fill-opacity",0.15)
  .attr("stroke",d=>getCityColor(d,"combined"))
  .attr("stroke-width",2)
  .attr("stroke-opacity",0.8)
  .style("cursor","pointer")
  .style("transition","all 0.3s");

bubbles.append("text").attr("class","bubble-label").attr("dy",-2).text(d=>d.city);
bubbles.append("text").attr("class","bubble-sublabel").attr("dy",12).text(d=>`${d.count}间`);

function updateBubbles(){
  bubbles.select("circle")
    .transition().duration(400)
    .attr("fill",d=>getCityColor(d,activeFilter))
    .attr("stroke",d=>getCityColor(d,activeFilter))
    .attr("fill-opacity",d=>{
      const ok = activeFilter==="combined" ? (d.plat||d.gold||d.shunxin) :
                 activeFilter==="plat" ? d.plat :
                 activeFilter==="gold" ? d.gold : d.shunxin;
      return ok ? 0.18 : 0.04;
    })
    .attr("stroke-opacity",d=>{
      const ok = activeFilter==="combined" ? (d.plat||d.gold||d.shunxin) :
                 activeFilter==="plat" ? d.plat :
                 activeFilter==="gold" ? d.gold : d.shunxin;
      return ok ? 0.8 : 0.15;
    });
}

// Tooltip
const tooltip = d3.select("#tooltip");
bubbles.on("mouseover",function(event,d){
  const lines = d.lounges.map(L=>{
    let s = `<span class="tt-row">`;
    s += `<b>${L.name}</b><br>`;
    s += `白金卡: ${L.plat?"✅ 带"+L.platGuest+"人":"❌"} · `;
    s += `金卡: ${L.gold?"✅ 带"+L.goldGuest+"人":"❌"} · `;
    s += `顺心飞: ${L.shunxin?"✅ 仅本人":"❌"}`;
    if(L.note) s += `<br><span style="color:#666">${L.note}</span>`;
    s += `</span>`;
    return s;
  }).join("");
  tooltip.html(`<div class="tt-city">${d.city} · ${d.region}</div>${lines}`)
    .style("opacity",1)
    .style("left",(event.pageX+15)+"px")
    .style("top",(event.pageY-10)+"px");
  d3.select(this).select("circle").attr("fill-opacity",0.35);
}).on("mousemove",function(event){
  tooltip.style("left",(event.pageX+15)+"px").style("top",(event.pageY-10)+"px");
}).on("mouseout",function(){
  tooltip.style("opacity",0);
  d3.select(this).select("circle").attr("fill-opacity",0.15);
});

// Legend
const legendData = [
  {label:"白金卡覆盖",color:"#ffd700"},
  {label:"金卡覆盖",color:"#c0c0c0"},
  {label:"顺心飞覆盖",color:"#3b82f6"},
  {label:"未覆盖",color:"#444"},
];
const legend = svg.append("g").attr("transform",`translate(${mapW-160},${mapH-80})`);
legendData.forEach((d,i)=>{
  const g = legend.append("g").attr("transform",`translate(0,${i*20})`);
  g.append("circle").attr("r",6).attr("fill",d.color).attr("fill-opacity",0.5).attr("stroke",d.color).attr("stroke-width",1.5);
  g.append("text").attr("class","legend-text").attr("x",14).attr("dy",4).text(d.label);
});

// ========== 3. KEY FINDINGS ==========
const findingsDiv = d3.select("#findings");
findings.forEach(f=>{
  const cls = f.type==="yes"?"f-yes":f.type==="warn"?"f-warn":"f-no";
  const icon = f.type==="yes"?"✅":f.type==="warn"?"⚠️":"❌";
  findingsDiv.append("div").attr("class",`finding-card ${cls}`)
    .html(`<h3><span class="finding-icon">${icon}</span>${f.title}</h3><p>${f.text}</p>`);
});

// ========== 4. GUEST RULES ==========
const grDiv = d3.select("#guest-rules");
guestRules.forEach(g=>{
  grDiv.append("div").attr("class",`guest-card ${g.cls}`)
    .html(`<div class="level">${g.level}</div><div class="count">${g.count}</div><div class="desc">${g.desc}</div>`);
});

// ========== 5. SHUNXIN 9 CITIES ==========
const pillsDiv = d3.select("#city-pills");
shunxin9.forEach(c=>{
  pillsDiv.append("div").attr("class","city-pill").text(c);
});

// ========== ANIMATION: pulse bubbles on load ==========
svg.selectAll("circle")
  .attr("r",0)
  .transition().duration(800).delay((d,i)=>i*60)
  .attr("r",d=>d.r);
</script>
</body>
</html>
